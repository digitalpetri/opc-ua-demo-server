# Environment variable overrides.
# Set the corresponding env var to override any config value.
# List values must be provided as a JSON array string, e.g. '["0.0.0.0"]'.

bind-address-list         = ${?BIND_ADDRESS_LIST}
bind-port                 = ${?BIND_PORT}
endpoint-address-list     = ${?ENDPOINT_ADDRESS_LIST}
certificate-hostname-list = ${?CERTIFICATE_HOSTNAME_LIST}
security-policy-list      = ${?SECURITY_POLICY_LIST}
security-mode-list        = ${?SECURITY_MODE_LIST}
gds-push-enabled          = ${?GDS_PUSH_ENABLED}
trust-all-certificates    = ${?TRUST_ALL_CERTIFICATES}
rate-limit-enabled        = ${?RATE_LIMIT_ENABLED}

address-space {
  demo.enabled           = ${?ADDRESS_SPACE_DEMO_ENABLED}
  ctt.enabled            = ${?ADDRESS_SPACE_CTT_ENABLED}
  data-type-test.enabled = ${?ADDRESS_SPACE_DATA_TYPE_TEST_ENABLED}
  dynamic.enabled        = ${?ADDRESS_SPACE_DYNAMIC_ENABLED}
  mass {
    enabled          = ${?ADDRESS_SPACE_MASS_ENABLED}
    flat-quantity    = ${?ADDRESS_SPACE_MASS_FLAT_QUANTITY}
    nested-quantity1 = ${?ADDRESS_SPACE_MASS_NESTED_QUANTITY1}
    nested-quantity2 = ${?ADDRESS_SPACE_MASS_NESTED_QUANTITY2}
  }
  null.enabled = ${?ADDRESS_SPACE_NULL_ENABLED}
  turtles {
    enabled = ${?ADDRESS_SPACE_TURTLES_ENABLED}
    depth   = ${?ADDRESS_SPACE_TURTLES_DEPTH}
  }
}

load {
  enabled            = ${?LOAD_ENABLED}
  name               = ${?LOAD_NAME}
  branch-count       = ${?LOAD_BRANCH_COUNT}
  depth-count        = ${?LOAD_DEPTH_COUNT}
  doubles-per-folder = ${?LOAD_DOUBLES_PER_FOLDER}
  bools-per-folder   = ${?LOAD_BOOLS_PER_FOLDER}
  ints-per-folder    = ${?LOAD_INTS_PER_FOLDER}
  strings-per-folder = ${?LOAD_STRINGS_PER_FOLDER}
  update-interval-ms = ${?LOAD_UPDATE_INTERVAL_MS}
}
